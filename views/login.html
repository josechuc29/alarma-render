<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Alarma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#17171a;--border:#2a2a2e;
  --accent:#e8c97e;--accent2:#c4a35a;--text:#f0ede8;--muted:#7a7875;--danger:#e05c5c;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(232,201,126,.06) 0%,transparent 70%);pointer-events:none}
.wrap{width:100%;max-width:380px;padding:24px}
.logo{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-.5px;color:var(--accent);margin-bottom:4px;text-align:center}
.sub{font-size:12px;color:var(--muted);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px}
.box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px}
label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:20px}
input:focus{border-color:var(--accent)}
button{width:100%;background:var(--accent);color:#0e0e0f;border:none;border-radius:8px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.5px;transition:background .2s}
button:hover{background:var(--accent2)}
.err{color:var(--danger);font-size:12px;text-align:center;margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Alarma</div>
  <div class="sub">Panel de Control</div>
  <div class="box">
    <form method="POST" action="/login">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="admin" autocomplete="off" required>
      <label>Contraseña</label>
      <input type="password" name="clave" placeholder="••••••••" required>
      <button type="submit">Ingresar</button>
    </form>
    <script>
      if(location.search.includes('error=1')){
        const p=document.createElement('p');
        p.className='err';p.textContent='Credenciales incorrectas';
        document.querySelector('form').after(p);
      }
    </script>
  </div>
</div>
</body>
</html>
